<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Runner: Fragmentos de Consciencia - Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-dark: #0a0b10;
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-purple: #bc13fe;
            --terminal-bg: rgba(16, 18, 26, 0.95);
            --glitch-speed: 3s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            color: white;
        }

        /* Layout Dividido */
        .main-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .game-view-reference {
            flex: 1;
            border-right: 2px solid rgba(0, 210, 255, 0.2);
            position: relative;
            background: transparent; /* AHORA ES TRANSPARENTE */
            pointer-events: none; /* Los clics pasan al juego */
        }

        /* Foco Principal: La Terminal */
        .terminal-interface {
            flex: 1;
            background-color: var(--terminal-bg);
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            border-left: 4px solid var(--neon-blue);
            box-shadow: -10px 0 30px rgba(0, 210, 255, 0.1);
        }

        /* Efecto Glitch sutil de fondo */
        .terminal-interface::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 1. Panel de Acciones */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 15px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            background: rgba(0, 210, 255, 0.1);
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn .icon-box {
            width: 50px;
            height: 50px;
            background: var(--neon-blue);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* 2. Cola de Instrucciones */
        .instruction-queue {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            padding: 20px;
            flex-grow: 1;
            margin-bottom: 20px;
            border: 1px dashed rgba(0, 210, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        /* Estilos para botones bloqueados */
        .action-btn.locked {
            filter: grayscale(1) brightness(0.5);
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.1);
        }
        
        .action-btn.locked .icon-box {
            background: #333 !important;
            box-shadow: none !important;
        }

        .action-btn.locked::after {
            content: "🔒";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 14px;
        }

        /* Contenedor de cápsulas mejorado */
        .instruction-queue {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
            padding: 15px;
        }

        /* Cápsulas de comandos mejoradas */
        .queue-item {
            background: rgba(0, 210, 255, 0.1);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Fredoka One', cursive;
            font-size: 14px;
            color: white;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), inset 0 0 10px rgba(0, 210, 255, 0.2);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .queue-item.jump {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
            text-shadow: 0 0 5px var(--neon-purple);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 3. Botones Principales (Ejecutar/Reiniciar) */
        .main-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-execute {
            flex: 2;
            background: var(--neon-green);
            color: #052005;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
            50% { box-shadow: 0 0 30px rgba(57, 255, 20, 0.8); }
            100% { box-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        }

        .btn-reset {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Fredoka One', cursive;
        }

        .btn-reset:hover {
            background: rgba(255, 49, 49, 0.2);
            border-color: var(--neon-red);
            color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 49, 49, 0.3);
        }

        .btn-reset:active {
            transform: scale(0.95);
        }

        /* 4. Indicador de Estado */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 100px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        .dot.emocion {
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* 5. Panel de Logs Emocionales */
        .emotional-logs {
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: var(--neon-blue);
            margin-top: 20px;
            border: 1px solid rgba(0, 210, 255, 0.1);
            overflow: hidden;
        }

        .log-text {
            border-right: 2px solid var(--neon-blue);
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(40, end), blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--neon-blue); } }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- ÁREA DE JUEGO (Referencia) -->
        <div class="game-view-reference">
            <div style="position: absolute; top: 20px; left: 20px; color: rgba(0,210,255,0.5); font-size: 12px;">
                VISTA_DEL_SISTEMA: ACTIVA
            </div>
        </div>

        <!-- TERMINAL DE REPARACIÓN (Foco) -->
        <div class="terminal-interface">
            
            <div class="status-bar">
                <div class="status-indicator">
                    <div class="dot logica"></div>
                    Lógica_Activa
                </div>
                <div class="status-indicator">
                    <div class="dot emocion"></div>
                    Emoción_Sincronizada
                </div>
            </div>

            <div class="action-grid">
                <button class="action-btn" id="btn-move">
                    <div class="icon-box">🚀</div>
                    <div class="btn-label">MOVER</div>
                </button>
                <button class="action-btn" id="btn-jump">
                    <div class="icon-box" style="background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple);">⭐</div>
                    <div class="btn-label">SALTAR</div>
                </button>
                <button class="action-btn locked" id="btn-wait" title="Bloqueado: Desbloquea en Nivel 2">
                    <div class="icon-box" style="background: #f1c40f; box-shadow: 0 0 10px #f1c40f;">⏳</div>
                    <div class="btn-label">ESPERAR</div>
                </button>
                <button class="action-btn locked" id="btn-state" title="Bloqueado: Desbloquea en Nivel 2">
                    <div class="icon-box" style="background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red);">🧠</div>
                    <div class="btn-label">ESTADO</div>
                </button>
            </div>

            <div class="instruction-queue" id="queue">
                <!-- Los bloques se añaden aquí -->
                <div id="empty-msg" style="text-align: center; color: rgba(255,255,255,0.2); margin-top: 50px; width: 100%;">
                    COLA_DE_INSTRUCCIONES_VACÍA
                </div>
            </div>

            <div class="main-controls">
                <button class="btn-reset" id="btn-reset">REINICIAR</button>
                <button class="btn-execute" id="btn-execute">EJECUTAR_ALGORITMO</button>
            </div>

            <div class="emotional-logs">
                <div class="log-text" id="log-display">> Cargando fragmentos de consciencia...</div>
            </div>

        </div>
    </div>

</body>
</html>

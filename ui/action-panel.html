<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Acciones - CodeRuner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            pointer-events: none; /* Deja que el juego reciba clicks fuera del panel */
        }

        .container-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto; /* Activa clicks solo para el panel */
        }

        .action-panel {
            background: rgba(44, 62, 80, 0.9);
            padding: 20px;
            border-radius: 30px;
            border: 6px solid #f1c40f;
            display: flex;
            gap: 20px;
            box-shadow: 0 15px 0px #d35400, 0 20px 30px rgba(0,0,0,0.5);
            font-family: 'Fredoka One', cursive;
        }

        .command-btn {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
            position: relative;
            outline: none;
        }

        /* Colores llamativos */
        .btn-move { 
            background-color: #3498db; 
            box-shadow: 0 8px 0 #2980b9;
        }
        .btn-turn { 
            background-color: #9b59b6; 
            box-shadow: 0 8px 0 #8e44ad;
        }
        .btn-action { 
            background-color: #2ecc71; 
            box-shadow: 0 8px 0 #27ae60;
        }

        /* Efecto de presionar (muy importante para niños) */
        .command-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 darkgrey;
        }

        .command-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.05) translateY(-2px);
        }

        .icon {
            font-size: 40px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .label {
            font-size: 14px;
            color: white;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        /* Animación suave al aparecer */
        .action-panel {
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container-ui">
        <div class="action-panel">
            <button class="command-btn btn-move">
                <span class="icon">🚀</span>
                <span class="label">¡VAMOS!</span>
            </button>
            <button class="command-btn btn-turn">
                <span class="icon">转向</span>
                <span class="label">GIRAR IZQ</span>
            </button>
            <button class="command-btn btn-turn">
                <span class="icon">转向</span>
                <span class="label">GIRAR DER</span>
            </button>
            <button class="command-btn btn-action">
                <span class="icon">⭐</span>
                <span class="label">USAR</span>
            </button>
        </div>
    </div>

</body>
</html>

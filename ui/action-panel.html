<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Acciones - CodeRuner</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .action-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 4px solid #f1c40f;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .command-btn {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .command-btn:hover {
            transform: scale(1.1);
        }
        .btn-move { background-color: #3498db; color: white; }
        .btn-turn { background-color: #e67e22; color: white; }
        .btn-action { background-color: #2ecc71; color: white; }
        
        .icon {
            font-size: 30px;
            margin-bottom: 5px;
        }
        .label {
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="action-panel">
        <button class="command-btn btn-move">
            <span class="icon">⬆️</span>
            <span class="label">AVANZAR</span>
        </button>
        <button class="command-btn btn-turn">
            <span class="icon">↪️</span>
            <span class="label">GIRAR DERECHA</span>
        </button>
        <button class="command-btn btn-turn">
            <span class="icon">↩️</span>
            <span class="label">GIRAR IZQ</span>
        </button>
        <button class="command-btn btn-action">
            <span class="icon">⚡</span>
            <span class="label">ACCIONAR</span>
        </button>
    </div>

</body>
</html>
